onboarding = false
[ui]
agent_panel_sort = "spaces"

show_agent_labels_on_pane_borders = false
[experimental]
pane_history = false

[ui.toast]
delivery = "terminal"

[[keys.command]]
key = "prefix+shift+g"
type = "plugin_action"
command = "worktrunk.open"
description = "Worktree: switch / create"

[[keys.command]]
key = "prefix+shift+d"
type = "plugin_action"
command = "worktrunk.remove"
description = "Worktree: remove"

[theme]
name = "gruvbox-light"
auto_switch = false
