onboarding = false
[theme]
name = "terminal"
auto_switch = false

[theme.custom]
accent = "#8DA101"
panel_bg = "#F8F5E4"
surface0 = "#EAE6D0"
surface1 = "#DED8BF"
surface_dim = "#E0DCC7"
overlay0 = "#5C6A54"
overlay1 = "#70816D"
text = "#5C6A72"
subtext0 = "#4F5D49"
mauve = "#DF69BA"
green = "#8DA101"
yellow = "#DFA000"
red = "#F85552"
blue = "#3A94C5"
teal = "#35A77C"
peach = "#F57D26"

[ui.toast]
delivery = "terminal"

[ui]
agent_panel_sort = "priority"

# Override herdr's built-in "new worktree" key (prefix+shift+g) with worktrunk's
# switch/create picker:
show_agent_labels_on_pane_borders = false
[[keys.command]]
key = "prefix+shift+g"
type = "plugin_action"
command = "worktrunk.open"
description = "Worktree: switch / create"

[[keys.command]]
key = "prefix+shift+d"
type = "plugin_action"
command = "worktrunk.remove"
description = "Worktree: remove"

[experimental]
pane_history = false
switch_ascii_input_source_in_prefix = true
